<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <!-- Logo -->
        <div class="logo">
            <img src="/img/logo.svg" alt="Logo image">
        </div>

        <!-- Main content wrapper -->
        <div class="main-wrapper">
            <img id="back-button" src="/img/link button.svg" alt="back-button">
            <h2>Compras da semana</h2>

            <!-- Add item form -->
            <div class="form-wrapper">
                <input id="add-item" type="text" placeholder="Adicione um novo item">
                <button id="add-btn">Adicionar item</button>
            </div>
        </div>
    </div>
</body>

</html>
